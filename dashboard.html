<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}ProfessorHub{% endblock %}</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <div class="d-flex" id="wrapper">
            <!-- Sidebar -->
            <div class="bg-light border-end p-4 pt-0" id="sidebar-wrapper">
                <div
                    class="sidebar-heading text-center py-4 primary-text fs-4 fw-bold border-bottom">ProfessorHub</div>
                <div class="list-group list-group-flush">
                    <a href="{% url 'dashboard' %}"
                        class="list-group-item list-group-item-action bg-light"><i
                            class="fas fa-book me-2"></i>Dashboard</a>
                    <a href="{% url 'disciplinas' %}"
                        class="list-group-item list-group-item-action bg-light"><i
                            class="fas fa-book me-2"></i>Disciplinas</a>
                    <a href="{% url 'tarefas' %}"
                        class="list-group-item list-group-item-action bg-light"><i
                            class="fas fa-tasks me-2"></i>Tarefas</a>
                    <a href="#"
                        class="list-group-item list-group-item-action bg-light"><i
                            class="fas fa-clipboard-list me-2"></i>Avaliações</a>
                    <a href="{% url 'logout' %}"
                        class="list-group-item list-group-item-action bg-light"><i
                            class="fas fa-sign-out-alt me-2"></i>Sair</a>
                </div>
            </div>
            <!-- /#sidebar-wrapper -->

            <!-- Page Content -->
            <div id="page-content-wrapper" class="w-100">
                <nav
                    class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                    <div class="container-fluid">
                        <button class="btn btn-primary" id="menu-toggle"><i
                                class="fas fa-bars"></i></button>
                        <h5 class="ms-3 mb-0">Painel Administrativo</h5>
                    </div>
                </nav>

                <!-- calendario, avisos -->
                <div class="container-fluid p-4 d-flex gap-3">
                    <div class="calendar col">
                        <div class="mb-4">
                            <h2>Visão do Calendário</h2>
                            <div class="btn-group" role="group"
                                aria-label="Calendar View">
                                <button type="button"
                                    class="btn btn-outline-primary">Dia</button>
                                <button type="button"
                                    class="btn btn-outline-primary">Semana</button>
                                <button type="button"
                                    class="btn btn-outline-primary">Mês</button>
                            </div>
                        </div>
                        <div id="calendar" class="border p-3"
                            style="height: 500px; background-color: #f8f9fa;">
                            <p class="text-center">
                                Aqui será exibido o calendário.
                            </p>
                        </div>
                    </div>
                    <div class="avisos col-4 d-flex flex-column gap-3">
                        <div class="card">
                            <div class="card-header">
                                Tarefas pra hoje
                            </div>
                            <!-- imagem de referencia salva em /static/ -->
                            <div class="card-body">
                                <p class="card-text d-flex justify-content-between">
                                    <div>12</div>
                                    <div class="alert alert-info">With supporting text below as a natural lead-in to additional content.</div>    
                                </p>
                            </div>
                        </div>
                        <!-- <div class="card">
                            <div class="card-header">
                                Avisos
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">Special title treatment</h5>
                                <p class="card-text">With supporting text below as a natural lead-in to additional content.</p>
                            </div>
                        </div> -->
                    </div>
                </div>
            </div>
        </div>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
    const toggleButton = document.getElementById('menu-toggle');
    const wrapper = document.getElementById('wrapper');
    toggleButton.addEventListener('click', () => {
        wrapper.classList.toggle('toggled');
    });
</script>
    </body>
</html>
